<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Blog - Home</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-brand">📝 Mini Blog</a>
      <div class="navbar-menu" id="navbarMenu">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="#" class="nav-link" id="navBlogs">All Blogs</a>
        <a href="#" class="nav-link" id="navCreateBlog" style="display: none">Create Blog</a>
        <a href="#" class="nav-link" id="navDashboard" style="display: none">Dashboard</a>
        <a href="#" class="nav-link" id="navLogout" style="display: none">Logout</a>
        <a href="login.html" class="nav-link" id="navLogin">Login</a>
        <a href="register.html" class="nav-link" id="navRegister">Register</a>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <main class="container">
    <!-- Welcome Section -->
    <section class="hero">
      <div class="hero-content">
        <h1>Welcome to Mini Blog</h1>
        <p>Share your thoughts and read amazing stories from our community</p>
        <a href="#blogs" class="btn btn-primary">Read Blogs</a>
      </div>
    </section>

    <!-- Blogs Section -->
    <section id="blogs" class="blogs-section">
      <h2>All Blog Posts</h2>
      <div class="filters">
        <input 
          type="text" 
          id="searchInput" 
          placeholder="Search blogs..." 
          class="search-input"
        />
      </div>
      <div class="blogs-grid" id="blogsGrid">
        <!-- Blog cards will be inserted here by JavaScript -->
        <p class="loading">Loading blogs...</p>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Mini Blog. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="js/common.js"></script>
  <script src="js/blog.js"></script>
</body>
</html>
