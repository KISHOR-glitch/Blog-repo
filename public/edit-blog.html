<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Blog - Mini Blog</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-brand">📝 Mini Blog</a>
      <div class="navbar-menu" id="navbarMenu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="#" class="nav-link" id="navDashboard">Dashboard</a>
        <a href="#" class="nav-link" id="navLogout">Logout</a>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <main class="container">
    <!-- Edit Blog Section -->
    <section class="form-section">
      <div class="form-container">
        <h1>Edit Blog</h1>
        <p class="form-subtitle">Update your blog post</p>

        <!-- Error Message -->
        <div id="errorMessage" class="alert alert-error" style="display: none;"></div>

        <!-- Success Message -->
        <div id="successMessage" class="alert alert-success" style="display: none;"></div>

        <!-- Edit Blog Form -->
        <form id="editBlogForm" class="blog-form">
          <!-- Title Field -->
          <div class="form-group">
            <label for="title">Blog Title</label>
            <input
              type="text"
              id="title"
              name="title"
              placeholder="Enter blog title"
              maxlength="200"
              required
            />
          </div>

          <!-- Description Field -->
          <div class="form-group">
            <label for="description">Description (Short Summary)</label>
            <textarea
              id="description"
              name="description"
              placeholder="Write a short description of your blog"
              rows="3"
              maxlength="500"
              required
            ></textarea>
          </div>

          <!-- Content Field -->
          <div class="form-group">
            <label for="content">Blog Content</label>
            <textarea
              id="content"
              name="content"
              placeholder="Write your full blog content here"
              rows="10"
              required
            ></textarea>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary">Update Blog</button>
          <a href="index.html" class="btn btn-secondary">Cancel</a>
        </form>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Mini Blog. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="js/common.js"></script>
  <script src="js/blog.js"></script>
</body>
</html>
