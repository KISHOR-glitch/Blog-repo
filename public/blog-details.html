<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Details - Mini Blog</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-brand">📝 Mini Blog</a>
      <div class="navbar-menu" id="navbarMenu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="#" class="nav-link" id="navCreateBlog" style="display: none">Create Blog</a>
        <a href="#" class="nav-link" id="navDashboard" style="display: none">Dashboard</a>
        <a href="#" class="nav-link" id="navLogout" style="display: none">Logout</a>
        <a href="login.html" class="nav-link" id="navLogin">Login</a>
        <a href="register.html" class="nav-link" id="navRegister">Register</a>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <main class="container">
    <!-- Blog Details Section -->
    <section class="blog-details-section">
      <div id="blogContent" class="blog-details-container">
        <!-- Blog details will be inserted here by JavaScript -->
        <p class="loading">Loading blog...</p>
      </div>
    </section>

    <!-- Comments Section -->
    <section class="comments-section">
      <h2>Comments</h2>

      <!-- Add Comment Form (Only for logged-in users) -->
      <div id="commentForm" style="display: none;" class="comment-form-container">
        <div class="form-group">
          <textarea
            id="commentText"
            placeholder="Add a comment..."
            rows="4"
            maxlength="1000"
          ></textarea>
          <button id="submitCommentBtn" class="btn btn-primary">Post Comment</button>
        </div>
      </div>

      <!-- Comments Display -->
      <div id="commentsList" class="comments-list">
        <!-- Comments will be inserted here by JavaScript -->
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 Mini Blog. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="js/common.js"></script>
  <script src="js/blog.js"></script>
</body>
</html>
