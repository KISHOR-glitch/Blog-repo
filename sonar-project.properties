# SonarQube Configuration for Mini Blog Site

# Project identification
sonar.projectKey=blog-site
sonar.projectName=blog-site
sonar.projectVersion=1.0.0

# SonarQube server URL
sonar.host.url=http://localhost:9000

# SonarQube authentication token
# Replace YOUR_TOKEN with your actual token generated from SonarQube
sonar.token=squ_e67c2c4714c52c5d2fe36746b703af4b8d017704

# Source code location
sonar.sources=.

# Exclusions
sonar.exclusions=node_modules/**,public/css/**,public/js/**

# Code coverage (optional)
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=js
